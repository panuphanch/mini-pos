name: Build and Release

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # NSIS bundler on Windows crashes inside the IsShortcutTarget macro
          # in Tauri's bundled installer.nsi (Tauri issue, not ours), so we
          # only build the MSI installer until it's resolved upstream.
          - os: windows-latest
            bundles: msi
            bundle_paths: |
              src-tauri/target/release/bundle/msi/*
          - os: macos-latest
            bundles: dmg
            bundle_paths: |
              src-tauri/target/release/bundle/dmg/*
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install npm dependencies
        # npm install (not npm ci) so the lockfile can be reconciled at install
        # time. vite ^5 + vitest ^4 produce a split dep tree (vitest carries a
        # nested vite ^7) and different npm versions resolve it differently;
        # ci insists on a perfectly synced lockfile, install does not. Tighten
        # back to `npm ci` once vite/vitest versions are aligned.
        run: npm install --no-audit --no-fund

      - name: Build Tauri app
        run: npm run tauri build -- --bundles ${{ matrix.bundles }}
        env:
          # Ad-hoc sign the macOS .app so Gatekeeper stops reporting the
          # bundle as "damaged" after download. First launch still needs
          # right-click → Open once (no Developer ID). Ignored on Windows.
          APPLE_SIGNING_IDENTITY: '-'

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: mini-pos-${{ runner.os }}
          path: ${{ matrix.bundle_paths }}
          if-no-files-found: error

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          pattern: mini-pos-*
          path: dist
          merge-multiple: true

      - name: Bump version and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          release_branches: master

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: Release ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}
          files: dist/*
          fail_on_unmatched_files: true
